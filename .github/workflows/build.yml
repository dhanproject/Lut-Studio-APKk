name: Build APK Final Fix

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: PROSES RAKIT TOTAL (CLEAN) 🚀
        run: |
          # 1. Bersihkan lingkungan dan install dependencies
          npm install --legacy-peer-deps
          npm install @capacitor/core @capacitor/cli @capacitor/android

          # 2. Pastikan ada folder dist (Syarat mutlak Capacitor)
          npm run build || true
          mkdir -p dist
          if [ ! -f "dist/index.html" ]; then
            echo "<html><body>LUT Studio</body></html>" > dist/index.html
          fi

          # 3. BUANG FOLDER ANDROID LAMA (Penyebab utama error sync)
          rm -rf android
          
          # 4. BUAT ULANG FOLDER ANDROID DARI NOL
          # Ini akan menjamin folder android cocok dengan versi Capacitor terbaru
          npx cap add android

          # 5. Sinkronisasi Aset ke Android
          npx cap sync android

          # 6. RAKIT APK
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LUT_OFFLINE_FIX_FINAL
          path: "android/app/build/outputs/apk/debug/app-debug.apk"
