name: Build APK Auto-Repair

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: PROSES PERAKITAN TOTAL 🛠️
        run: |
          # A. Install bahan baku
          npm install --legacy-peer-deps
          
          # B. Siapkan aset (Bypass jika error)
          npm run build || (mkdir -p dist && echo "<html><body>Offline</body></html>" > dist/index.html)
          
          # C. CEK FOLDER ANDROID. Kalau tidak ada, kita buatkan otomatis!
          if [ ! -d "android" ]; then
            echo "Folder Android tidak ditemukan, membangun ulang..."
            npx cap add android
          fi
          
          # D. Sinkronisasi
          npx cap sync android
          
          # E. RAKIT APK
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Hasil APK
        uses: actions/upload-artifact@v4
        with:
          name: LUT_Studio_OFFLINE_HASIL_AKHIR
          path: "**/app-debug.apk"
