name: Build APK Android Otomatis Terbaru

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & Build Web
        run: |
          npm install --legacy-peer-deps
          # Coba build, kalau gagal pakai mode static simple
          npm run build || (mkdir -p dist && cp index.html dist/index.html)
          npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Rakit APK Debug 🚀
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Hasil APK
        uses: actions/upload-artifact@v4
        with:
          name: LUT_Studio_OFFLINE_FINAL
          path: android/app/build/outputs/apk/debug/app-debug.apk
