name: Auto-Build APK Final

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Eksekusi Rakit APK 🛠️
        run: |
          # 1. Install & Build Web (Hasilkan folder dist)
          npm install --legacy-peer-deps
          npm run build || (mkdir -p dist && echo "<html><body>LUT Studio</body></html>" > dist/index.html)
          
          # 2. Tambah Platform Android Paket Komplit (Kalau belum ada)
          if [ ! -d "android" ]; then
            npm install @capacitor/android
            npx cap add android
          fi
          
          # 3. Sinkronisasi Aset
          npx cap sync android
          
          # 4. Rakit file APK
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Simpan Hasil APK
        uses: actions/upload-artifact@v4
        with:
          name: APK_SEDIA_PAKAI
          path: "**/app-debug.apk"
