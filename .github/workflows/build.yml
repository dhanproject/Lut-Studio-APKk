name: Build APK Android Native

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Rakit APK Langsung dari Folder Native 🚀
        run: |
          # Cari folder android secara otomatis
          ANDROID_PATH=$(find . -name "gradlew" -type f -exec dirname {} \; | head -n 1)
          
          if [ -z "$ANDROID_PATH" ]; then
            echo "ERROR: Folder Android (gradlew) tidak ditemukan di dalam ZIP Mas!"
            exit 1
          fi
          
          echo "Folder Android ditemukan di: $ANDROID_PATH"
          cd "$ANDROID_PATH"
          chmod +x gradlew
          
          # Langsung hajar rakit tanpa peduli urusan NPM/Web
          ./gradlew assembleDebug

      - name: Upload APK Jadi
        uses: actions/upload-artifact@v4
        with:
          name: LUT_Studio_NATIVE_APK
          path: "**/app-debug.apk"
