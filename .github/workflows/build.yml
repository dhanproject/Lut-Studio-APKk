name: Build APK Super-Robot

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: PROSES RAKIT TOTAL (FORCED) 🛠️
        run: |
          set -e
          # 1. Paksa install bahan baku
          npm install --legacy-peer-deps --no-package-lock
          npm install @capacitor/core @capacitor/cli @capacitor/android --save-dev --no-package-lock

          # 2. Web Build (Kalau error, buat file darurat agar Capacitor tidak mogok)
          npm run build || true
          mkdir -p dist
          if [ ! -f "dist/index.html" ]; then
             cp index.html dist/index.html || echo "<html><body>LUT Studio Offline</body></html>" > dist/index.html
          fi

          # 3. Paksa buat Config Capacitor jika hilang
          if [ ! -f "capacitor.config.json" ] && [ ! -f "capacitor.config.ts" ]; then
            echo '{"appId":"com.dhan.lut","appName":"LUT Studio","webDir":"dist"}' > capacitor.config.json
          fi

          # 4. Paksa Tambah/Update Platform Android
          if [ ! -d "android" ]; then
            npx cap add android || true
          fi
          npx cap sync android

          # 5. Rakit APK Native
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Simpan APK
        uses: actions/upload-artifact@v4
        with:
          name: LUT_OFFLINE_HORE
          path: "**/app-debug.apk"
