name: Build APK Android Otomatis

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Ambil File ZIP di Gudang
      uses: actions/checkout@v4

    - name: Ekstrak File ZIP
      run: |
        sudo apt-get install -y unzip
        unzip *.zip -d app_code

    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Pasang Pustaka & Sinkron Capacitor
      run: |
        cd app_code
        npm install
        mkdir -p dist
        cp index.html dist/index.html || true
        npx cap sync android

    - name: Siapkan Java (Bahan Android)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Rakit APK dengan Gradle! 🚀
      run: |
        cd app_code/android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Simpan Hasil APK 
      uses: actions/upload-artifact@v4
      with:
        name: Hasil-App-LUT-Studio
        path: app_code/android/app/build/outputs/apk/debug/app-debug.apk
